name: Visual regression

# Runs the Playwright `visual` project (iPhone XR + iPad Air screenshots) inside the
# Playwright Docker image so rendering matches the committed Linux baselines. The PNGs
# are always uploaded as the `visual-screenshots` artifact.
#
#   - pull_request: compare against committed baselines (the check).
#   - workflow_dispatch + update=true: regenerate baselines (download the artifact and
#     commit the *-linux.png files to bootstrap / refresh them).

on:
  pull_request:
  workflow_dispatch:
    inputs:
      update:
        description: "Regenerate baselines instead of checking them"
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    container:
      # Keep this tag in lockstep with @playwright/test in package.json (1.61.0).
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - run: npm run build

      - name: Run visual project
        # inputs.update is null on pull_request -> falls through to the check.
        run: npm run ${{ inputs.update && 'test:visual:update' || 'test:visual' }}

      - name: Upload screenshots
        if: always() # upload on pass AND fail
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: |
            e2e/*-snapshots/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
