name: E2E

# Runs the Playwright functional smoke tests on every PR, inside the Playwright image
# (browsers preinstalled). On failure the report + traces are uploaded.

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    container:
      # Match @playwright/test in package.json (1.61.0).
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
